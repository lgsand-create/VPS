<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Bakgrund med rundade hörn
  const r = s * 0.18;
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Yttre cirkel
  const cx = s / 2, cy = s / 2;
  const outerR = s * 0.34;
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = s * 0.02;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.stroke();

  // Check-ikon
  ctx.strokeStyle = '#059669';
  ctx.lineWidth = s * 0.05;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s * 0.33, cy);
  ctx.lineTo(s * 0.45, s * 0.58);
  ctx.lineTo(s * 0.67, s * 0.38);
  ctx.stroke();

  // Liten puls-linje (heartbeat)
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = s * 0.02;
  ctx.beginPath();
  ctx.moveTo(s * 0.2, s * 0.75);
  ctx.lineTo(s * 0.35, s * 0.75);
  ctx.lineTo(s * 0.4, s * 0.68);
  ctx.lineTo(s * 0.45, s * 0.82);
  ctx.lineTo(s * 0.5, s * 0.72);
  ctx.lineTo(s * 0.55, s * 0.78);
  ctx.lineTo(s * 0.6, s * 0.75);
  ctx.lineTo(s * 0.8, s * 0.75);
  ctx.stroke();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Högerklicka och "Spara bild som..." för att ladda ner ikonerna
// Eller ladda ner automatiskt:
['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon-${canvas.width}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Ladda ner icon-${canvas.width}.png`;
  link.style.display = 'block';
  link.style.margin = '10px';
  document.body.appendChild(link);
});
</script>
</body>
</html>
